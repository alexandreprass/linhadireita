# Blueprint Render — LINHA DIREITA
# 1) Conecte o repo GitHub
# 2) Configure XAI_API_KEY, ADMIN_PASSWORD, CRON_SECRET, DATABASE_URL
# 3) Cron chama /api/cron/collect a cada 1 hora (máx. 2 notícias/hora)

services:
  - type: web
    name: linhadireita
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: linhadireita-db
          property: connectionString
      - key: XAI_API_KEY
        sync: false
      - key: GROK_MODEL
        value: grok-4.5
      - key: GROK_IMAGE_MODEL
        value: grok-imagine-image
      - key: MAX_REWRITE_PER_CYCLE
        value: "2"
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_SITE_URL
        sync: false

  - type: cron
    name: linhadireita-collect
    runtime: node
    schedule: "0 * * * *"
    buildCommand: echo "cron uses web service endpoint"
    startCommand: |
      curl -s -X POST "$CRON_URL/api/cron/collect?secret=$CRON_SECRET"
    envVars:
      - key: CRON_URL
        sync: false
      - key: CRON_SECRET
        sync: false

databases:
  - name: linhadireita-db
    plan: free
    databaseName: linhadireita
    user: linhadireita
